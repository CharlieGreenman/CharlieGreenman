<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Charlie Greenman profile hero</title>
  <desc id="desc">A warm ivory banner with Charlie Greenman's name and an animated Tetris-inspired playfield showing pieces dropping, a line clearing, and play continuing.</desc>

  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1220" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF5ED"/>
      <stop offset="1" stop-color="#F1E8D9"/>
    </linearGradient>
    <linearGradient id="panel" x1="944" y1="62" x2="1230" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F0E4"/>
      <stop offset="1" stop-color="#E9DDC7"/>
    </linearGradient>
    <linearGradient id="screen" x1="968" y1="104" x2="1208" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#223A33"/>
      <stop offset="1" stop-color="#14231E"/>
    </linearGradient>
    <linearGradient id="lineFade" x1="820" y1="50" x2="1240" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D5C3A2"/>
      <stop offset="1" stop-color="#E8DDC7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1088 212) rotate(90) scale(188 188)">
      <stop stop-color="#C7A36A" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#C7A36A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1088 224) rotate(90) scale(150 150)">
      <stop stop-color="#FFF2D8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFF2D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineClear" x1="968" y1="228" x2="1208" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7EA" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#FFF7EA" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#E7C27F" stop-opacity="0.95"/>
      <stop offset="0.84" stop-color="#FFF7EA" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFF7EA" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#6F8B80" stroke-opacity="0.34" stroke-width="1"/>
    </pattern>
    <clipPath id="boardClip">
      <rect x="968" y="104" width="240" height="240" rx="18"/>
    </clipPath>
  </defs>

  <style>
    .orbital {
      animation: orbitalPulse 6.6s ease-in-out infinite;
    }

    .screen-glow {
      animation: screenBreath 6.4s ease-in-out infinite;
    }

    .scan-band {
      animation: scanSweep 7.6s linear infinite;
    }

    .status-dot {
      animation: dotBlink 1.2s steps(2, end) infinite;
    }

    .stack-pre {
      animation: showPre 8s infinite step-end;
    }

    .stack-post {
      animation: showPost 8s infinite step-end;
    }

    .ghost-i {
      animation: ghostFade 8s infinite step-end;
    }

    .i-piece {
      animation: iDrop 8s infinite, pieceFade 8s infinite step-end;
    }

    .line-flash {
      animation: lineFlash 8s infinite ease-out;
    }

    .t-piece {
      animation: tDrop 8s infinite, tFade 8s infinite step-end;
    }

    .spark-1 {
      animation: sparkleOne 4.8s ease-in-out infinite;
    }

    .spark-2 {
      animation: sparkleTwo 5.4s ease-in-out infinite;
    }

    .spark-3 {
      animation: sparkleThree 6.2s ease-in-out infinite;
    }

    @keyframes orbitalPulse {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }

    @keyframes screenBreath {
      0%, 100% { opacity: 0.26; }
      45% { opacity: 0.52; }
      70% { opacity: 0.34; }
    }

    @keyframes scanSweep {
      0% { transform: translateY(-188px); opacity: 0; }
      10% { opacity: 0.12; }
      45% { opacity: 0.28; }
      80% { opacity: 0.16; }
      100% { transform: translateY(224px); opacity: 0; }
    }

    @keyframes dotBlink {
      0%, 45% { opacity: 0.35; }
      46%, 100% { opacity: 1; }
    }

    @keyframes showPre {
      0%, 74.9% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }

    @keyframes showPost {
      0%, 74.9% { opacity: 0; }
      75%, 100% { opacity: 1; }
    }

    @keyframes ghostFade {
      0%, 60% { opacity: 0.38; }
      61%, 100% { opacity: 0; }
    }

    @keyframes iDrop {
      0%, 8% { transform: translate(144px, 0px); }
      16%, 24% { transform: translate(144px, 24px); }
      32%, 40% { transform: translate(144px, 48px); }
      48%, 56% { transform: translate(144px, 72px); }
      60%, 64% { transform: translate(144px, 96px); }
      65%, 68% { transform: translate(144px, 120px); }
      69%, 71% { transform: translate(144px, 144px); }
      72%, 73% { transform: translate(144px, 168px); }
      73.2%, 74.1% { transform: translate(144px, 192px); }
      74.3%, 74.9% { transform: translate(144px, 216px); }
      75%, 100% { transform: translate(144px, 216px); }
    }

    @keyframes pieceFade {
      0%, 74.9% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }

    @keyframes lineFlash {
      0%, 64% { opacity: 0; }
      67% { opacity: 0.96; }
      70% { opacity: 0.18; }
      73% { opacity: 1; }
      76%, 100% { opacity: 0; }
    }

    @keyframes tFade {
      0%, 75% { opacity: 0; }
      75.1%, 100% { opacity: 1; }
    }

    @keyframes tDrop {
      0%, 75% { transform: translate(120px, -72px); }
      80% { transform: translate(120px, -48px); }
      84% { transform: translate(120px, -24px); }
      88% { transform: translate(120px, 0px); }
      91% { transform: translate(120px, 24px); }
      94% { transform: translate(120px, 48px); }
      96% { transform: translate(120px, 72px); }
      97.5% { transform: translate(120px, 96px); }
      98.5% { transform: translate(120px, 120px); }
      99.2% { transform: translate(120px, 144px); }
      100% { transform: translate(120px, 168px); }
    }

    @keyframes sparkleOne {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    @keyframes sparkleTwo {
      0%, 100% { opacity: 0.12; }
      35% { opacity: 0.72; }
      75% { opacity: 0.25; }
    }

    @keyframes sparkleThree {
      0%, 100% { opacity: 0.16; }
      40% { opacity: 0.65; }
      60% { opacity: 0.22; }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbital,
      .screen-glow,
      .scan-band,
      .status-dot,
      .stack-pre,
      .stack-post,
      .ghost-i,
      .i-piece,
      .line-flash,
      .t-piece,
      .spark-1,
      .spark-2,
      .spark-3 {
        animation: none !important;
      }

      .stack-pre,
      .ghost-i,
      .i-piece,
      .line-flash {
        opacity: 0;
      }

      .stack-post,
      .t-piece {
        opacity: 1;
      }

      .t-piece {
        transform: translate(120px, 168px);
      }
    }
  </style>

  <rect x="8" y="8" width="1264" height="404" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1240" height="380" rx="20" stroke="#D1BE99" stroke-width="2"/>

  <path d="M72 108H828" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M72 336H676" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M72 376H676" stroke="#E6DAC2" stroke-width="1"/>

  <circle cx="1088" cy="212" r="188" fill="url(#glow)"/>
  <circle cx="1088" cy="212" r="162" stroke="#D1BE99" stroke-width="1.5" class="orbital"/>
  <circle cx="1088" cy="212" r="124" stroke="#D8C7A7" stroke-width="1" class="orbital"/>
  <circle cx="1088" cy="212" r="88" stroke="#DFD3BC" stroke-width="1" class="orbital"/>
  <path d="M924 212H1248" stroke="url(#lineFade)" stroke-width="1"/>
  <path d="M1088 48V376" stroke="url(#lineFade)" stroke-width="1"/>

  <path d="M936 68H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 104H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 140H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 176H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 248H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 284H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 320H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M936 356H1240" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M972 44V380" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M1008 44V380" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M1044 44V380" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M1080 44V380" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M1116 44V380" stroke="#E2D6BF" stroke-width="1"/>
