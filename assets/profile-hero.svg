        <rect x="49" y="193" width="22" height="22" rx="4.5" fill="#B58746"/>
        <rect x="121" y="193" width="22" height="22" rx="4.5" fill="#D9C39A"/>
        <rect x="145" y="193" width="22" height="22" rx="4.5" fill="#6E8B7E"/>
        <rect x="169" y="193" width="22" height="22" rx="4.5" fill="#6E8B7E"/>

        <rect x="25" y="169" width="22" height="22" rx="4.5" fill="#B76A57"/>
        <rect x="49" y="169" width="22" height="22" rx="4.5" fill="#B76A57"/>
        <rect x="73" y="169" width="22" height="22" rx="4.5" fill="#4D6E65"/>
        <rect x="97" y="169" width="22" height="22" rx="4.5" fill="#4D6E65"/>

        <rect x="73" y="145" width="22" height="22" rx="4.5" fill="#B58746"/>
        <rect x="97" y="145" width="22" height="22" rx="4.5" fill="#6E8B7E"/>
      </g>

      <g class="stack-post" stroke="#FFF7EA" stroke-opacity="0.08" stroke-width="1">
        <rect x="1" y="217" width="22" height="22" rx="4.5" fill="#4D6E65"/>
        <rect x="25" y="217" width="22" height="22" rx="4.5" fill="#4D6E65"/>
        <rect x="49" y="217" width="22" height="22" rx="4.5" fill="#B58746"/>
        <rect x="121" y="217" width="22" height="22" rx="4.5" fill="#D9C39A"/>
        <rect x="145" y="217" width="22" height="22" rx="4.5" fill="#6E8B7E"/>
        <rect x="169" y="217" width="22" height="22" rx="4.5" fill="#6E8B7E"/>

        <rect x="25" y="193" width="22" height="22" rx="4.5" fill="#B76A57"/>
