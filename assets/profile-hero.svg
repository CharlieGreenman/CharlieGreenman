        <rect x="97" y="217" width="22" height="22" rx="4.5" fill="#B76A57"/>
        <rect x="121" y="217" width="22" height="22" rx="4.5" fill="#B76A57"/>

        <rect x="1" y="193" width="22" height="22" rx="4.5" fill="#4D6E65"/>
