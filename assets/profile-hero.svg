  <path d="M1188 44V380" stroke="#E2D6BF" stroke-width="1"/>
  <path d="M1224 44V380" stroke="#E2D6BF" stroke-width="1"/>

  <circle cx="965" cy="94" r="3.5" fill="#C9A15C" class="spark-1"/>
  <circle cx="1216" cy="122" r="4" fill="#49675F" class="spark-2"/>
  <circle cx="1188" cy="332" r="3.5" fill="#B76A57" class="spark-3"/>
  <circle cx="952" cy="300" r="2.5" fill="#D6C4A2" class="spark-2"/>

  <text x="76" y="76" fill="#927044" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" letter-spacing="3.2">TECHNICAL FOUNDER / GENERALIST / AI PRODUCT BUILDER</text>

  <text x="72" y="166" fill="#1D1B18" font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="72" font-weight="700" letter-spacing="0.5">Charlie</text>
  <text x="72" y="236" fill="#1D1B18" font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="72" font-weight="700" letter-spacing="0.5">Greenman</text>

  <text x="76" y="286" fill="#403A31" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="24">AI systems, product architecture, technical leadership, and long-form writing.</text>
  <text x="76" y="320" fill="#403A31" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="24">Useful work, not demos.</text>

  <rect x="74" y="346" width="146" height="34" rx="17" fill="#1F312D"/>
  <rect x="230" y="346" width="178" height="34" rx="17" fill="#AF8241"/>
  <rect x="418" y="346" width="236" height="34" rx="17" fill="#D8CAB1"/>

  <text x="104" y="368" fill="#F4ECE0" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="15">NEW YORK</text>
  <text x="262" y="368" fill="#FFF7EA" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="15">RAZROO</text>
  <text x="444" y="368" fill="#5A4E3E" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="14">SYSTEMS / WRITING</text>

  <ellipse cx="1088" cy="362" rx="132" ry="18" fill="#B69461" fill-opacity="0.12"/>
  <rect x="942" y="60" width="292" height="304" rx="28" fill="url(#panel)" stroke="#C9B28C" stroke-width="1.5"/>
  <rect x="958" y="78" width="260" height="270" rx="20" fill="#F9F4EC" stroke="#D8C7A7"/>

  <text x="972" y="97" fill="#715731" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.4">SYSTEM LOOP</text>
  <circle cx="1162" cy="91" r="5" fill="#4C6A61" class="status-dot"/>
  <text x="1212" y="97" fill="#715731" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" text-anchor="end">ACTIVE</text>

  <rect x="968" y="104" width="240" height="240" rx="18" fill="url(#screen)"/>
  <rect x="968" y="104" width="240" height="240" rx="18" fill="url(#screenGlow)" class="screen-glow"/>
  <rect x="968" y="104" width="240" height="240" rx="18" fill="url(#grid)" opacity="0.92"/>

