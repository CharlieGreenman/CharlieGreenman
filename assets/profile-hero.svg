    <rect x="968" y="104" width="240" height="64" fill="#12201C" fill-opacity="0.18"/>
    <rect x="968" y="104" width="240" height="68" fill="#FFF4DE" fill-opacity="0.14" class="scan-band"/>

    <g transform="translate(968 104)">
      <g class="stack-pre" stroke="#FFF7EA" stroke-opacity="0.08" stroke-width="1">
        <rect x="1" y="217" width="22" height="22" rx="4.5" fill="#B58746"/>
        <rect x="25" y="217" width="22" height="22" rx="4.5" fill="#B58746"/>
        <rect x="49" y="217" width="22" height="22" rx="4.5" fill="#6E8B7E"/>
